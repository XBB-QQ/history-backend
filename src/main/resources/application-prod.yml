server:
  port: ${PORT:8080}

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:history_museum}?useSSL=${SSL:false}&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root123}

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  web:
    resources:
      static-locations: classpath:/static/

# --- LLM 代理配置 ---
llm:
  base-url: ${LLM_BASE_URL:https://open.bigmodel.cn/api/paas/v4}
  api-key: ${LLM_API_KEY:52898a2aa335429697b2fc637f7d0629.uLcqtcZHj5jm1cAx}
  model: ${LLM_MODEL:glm-4-flash}

logging:
  level:
    com.history: INFO
