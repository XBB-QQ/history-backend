server:
  port: 8080

spring:
  application:
    name: five-millennium-museum

  # --- ïŋ―ïŋ―ïŋ―ïŋ―Ôīïŋ―ïŋ―MySQL ---
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/history_museum?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root123}

  # --- JPA / Hibernate ---
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  # --- Flyway ïŋ―ïŋ―ïŋ―Ýŋïŋ―ĮĻïŋ―ÆĢïŋ―ïŋ―ØąÕĢïŋ―ïŋ―Öķïŋ―Öīïŋ―ïŋ― SQLïŋ―ïŋ― ---
  flyway:
    enabled: false

  # --- ïŋ―ïŋ―ĖŽïŋ―ïŋ―Ôīïŋ―ïŋ―Į°ïŋ―Ëđïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïŋ―ïĢĐ---
  web:
    resources:
      static-locations: classpath:/static/

  # --- ïŋ―Äžïŋ―ïŋ―Ïīïŋ―ïŋ―ïŋ―ïŋ―ïŋ― ---
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# --- ïŋ―ïŋ―Öū ---
logging:
  level:
    com.history: DEBUG
  pattern:
    console: "%d{MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
