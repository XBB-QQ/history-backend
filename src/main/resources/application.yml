server:
  port: 8080

spring:
  application:
    name: five-millennium-museum

  # --- 数据源（MySQL） ---
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/history_museum?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root123}

  # --- JPA / Hibernate ---
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  # --- 国际化消息编码 ---
  messages:
    encoding: UTF-8
    basename: i18n/messages

  # --- 静态资源（前端构建产物） ---
  web:
    resources:
      static-locations: classpath:/static/

  # --- 文件上传限制 ---
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # --- Flyway 启用（管理数据库迁移） ---
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

# --- LLM 代理配置 ---
llm:
  base-url: ${LLM_BASE_URL:https://open.bigmodel.cn/api/paas/v4}
  api-key: ${LLM_API_KEY:}
  model: ${LLM_MODEL:glm-4-flash}

# --- Embedding 配置 ---
embedding:
  provider: ${EMBEDDING_PROVIDER:zhipu}
  base-url: ${EMBEDDING_BASE_URL:https://open.bigmodel.cn/api/paas/v4}
  api-key: ${EMBEDDING_API_KEY:}
  model: ${EMBEDDING_MODEL:embedding-3}
  dimensions: ${EMBEDDING_DIMENSIONS:1024}

# --- RAG 配置 ---
rag:
  vector-store: ${RAG_VECTOR_STORE:mysql}
  top-k: ${RAG_TOP_K:5}
  auto-index: ${RAG_AUTO_INDEX:true}
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    index: ${RAG_REDIS_INDEX:history_vectors}

# --- ctext.org 典籍 API 配置 ---
# 申请地址：https://ctext.org/account.pl
# 未配置 api-key 时仅能访问 searchtexts / readlink / getstatus 等公开端点
ctext:
  base-url: ${CTEXT_BASE_URL:https://api.ctext.org}
  api-key: ${CTEXT_API_KEY:}
  timeout-ms: ${CTEXT_TIMEOUT_MS:8000}
  cache-ttl-ms: ${CTEXT_CACHE_TTL_MS:86400000}

# --- Wikisource 典籍 API 配置 ---
# 端点：https://zh.wikisource.org/w/api.php
# 无需 API key，支持 CORS，国内访问稳定
# 作为 ctext.org 的替代源，双源策略：ctext（权威） + Wikisource（快速）
wikisource:
  base-url: ${WIKISOURCE_BASE_URL:https://zh.wikisource.org/w/api.php}
  timeout-ms: ${WIKISOURCE_TIMEOUT_MS:8000}
  cache-ttl-ms: ${WIKISOURCE_CACHE_TTL_MS:86400000}
  search-limit: ${WIKISOURCE_SEARCH_LIMIT:20}

# --- 日志 ---
logging:
  level:
    com.history: INFO
    sql: WARN
  pattern:
    console: "%d{MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"