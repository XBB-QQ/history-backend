server:
  port: 8080

spring:
  application:
    name: five-millennium-museum

  # --- 数据源：MySQL ---
  datasource:
    url: jdbc:mysql://localhost:3306/history_museum?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root123

  # --- JPA / Hibernate ---
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  # --- Flyway 数据库迁移（关闭，手动执行 SQL） ---
  flyway:
    enabled: false

  # --- 静态资源（前端构建产物）---
  web:
    resources:
      static-locations: classpath:/static/

  # --- 文件上传限制 ---
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# --- 日志 ---
logging:
  level:
    com.history: DEBUG
  pattern:
    console: "%d{MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
