server:
  port: 8080

spring:
  application:
    name: five-millennium-museum

  # --- 数据源（MySQL） ---
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/history_museum?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root123}

  # --- JPA / Hibernate ---
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  # --- 静态资源（前端构建产物） ---
  web:
    resources:
      static-locations: classpath:/static/

  # --- 文件上传限制 ---
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # --- Flyway 启用（管理数据库迁移） ---
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

# --- LLM 代理配置 ---
llm:
  base-url: ${LLM_BASE_URL:https://open.bigmodel.cn/api/paas/v4}
  api-key: ${LLM_API_KEY:}
  model: ${LLM_MODEL:glm-4-flash}

# --- Embedding 配置 ---
embedding:
  provider: ${EMBEDDING_PROVIDER:zhipu}
  base-url: ${EMBEDDING_BASE_URL:https://open.bigmodel.cn/api/paas/v4}
  api-key: ${EMBEDDING_API_KEY:}
  model: ${EMBEDDING_MODEL:embedding-3}
  dimensions: ${EMBEDDING_DIMENSIONS:1024}

# --- RAG 配置 ---
rag:
  vector-store: ${RAG_VECTOR_STORE:memory}
  top-k: ${RAG_TOP_K:5}
  auto-index: ${RAG_AUTO_INDEX:true}
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    index: ${RAG_REDIS_INDEX:history_vectors}

# --- 日志 ---
logging:
  level:
    com.history: DEBUG
    sql: DEBUG
  pattern:
    console: "%d{MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

